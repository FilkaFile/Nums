<!DOCTYPE html>
<html>

<head>
	<title>Картотека товаров</title>
</head>

<body>
	<h2>Товары</h2>
	<div id="list"></div>
	<hr>
	<h3>Добавить товар</h3>
	<input id="name" placeholder="Название">
	<input id="price" placeholder="Цена" type="number">
	<button onclick="addItem()">+</button>

	<script>
		async function loadItems() {
			let res = await fetch('/items');
			let items = await res.json();
			document.getElementById('list').innerHTML = items.map(i => `
                <div style="margin-bottom: 10px;">
                    <b>${i.name}</b> — ${i.price} руб.
                    <button onclick="deleteItem('${i.id}')">-</button>
                    <button onclick="updateItem('${i.id}', '${i.name}', ${i.price})">Изменить</button>
                </div>
            `).join('');
			items.map(i => console.log(i)).join('');
		}

		async function addItem() {
			let name = document.getElementById('name').value;
			let price = document.getElementById('price').value;
			await fetch('/items', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ name: name, price: parseFloat(price) })
			});
			loadItems();
		}

		async function deleteItem(id) {
			await fetch(`/items/${id}`, { method: 'DELETE' });
			loadItems();
		}

		// НОВАЯ ФУНКЦИЯ ДЛЯ PUT ЗАПРОСА
		async function updateItem(id, oldName, oldPrice) {
			let newName = prompt("Введите новое название:", oldName);
			let newPrice = prompt("Введите новую цену:", oldPrice);

			if (newName && newPrice) {
				await fetch(`/items/${id}`, {
					method: 'PUT',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({
						id: id,
						name: newName, price: parseFloat(newPrice)
					})
				});
				loadItems();
			}
		}

		loadItems();
	</script>
</body>

</html>
